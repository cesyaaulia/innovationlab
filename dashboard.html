<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - WebGIS SDGs</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-pink-200 min-h-screen flex">

  <!-- Sidebar -->
<aside class="bg-blue-200 p-6 text-[#3e495e] w-full md:w-64">
  <h2 class="text-xl font-bold mb-4">📂 Filter Kategori</h2>
  <ul class="space-y-2">
    <li><label><input type="checkbox" class="mr-2"> Pendidikan</label></li>
    <li><label><input type="checkbox" class="mr-2"> Kesehatan</label></li>
    <li><label><input type="checkbox" class="mr-2"> Lingkungan</label></li>
    <li>
      <a href="login.html"
         class="inline-block bg-[#323e4c] text-white px-4 py-2 rounded hover:bg-[#2a3440]">
        Logout
      </a>
    </li>
  </ul>
</aside>

  <!-- Main Content -->
  <main class="flex-1 p-8 bg-pink-200 text-gray-800">
  <h1 class="text-2xl font-bold text-[#3e495e] mb-6">WebGIS SDGs Tracker 🌎</h1>

    <div class="mb-8">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3957.3434436714774!2d112.72467837357212!3d-7.315261271926133!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x2dd7fb7081be4f83%3A0xa9c00ebea3e64b3d!2sUniversitas%20Negeri%20Surabaya%20-%20Kampus%201!5e0!3m2!1sid!2sid!4v1747576614129!5m2!1sid!2sid"
        width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade" class="rounded shadow-md"></iframe>
    </div>

    <section class="bg-blue-100 p-6 rounded shadow-md max-w-xl">
      <h3 class="text-2xl font-bold text-black-500 mb-2">Detail Lokasi 📍</h3>
      <p><strong>Nama:</strong> Universitas Negeri Surabaya</p>
      <p><strong>Kategori:</strong> Pendidikan</p>
      <p><strong>Progress SDGs:</strong> 90%</p>
    </section>
  </main>

</body>
</html>
