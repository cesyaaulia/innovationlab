<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - WebGIS SDGs Tracker</title>

  <!-- Menambahkan Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #fbcfe8;" class="d-flex align-items-center justify-content-center vh-100">

<main class="card p-4 shadow-sm" style="width: 100%; max-width: 400px; background-color: #c6defa;">
    <h1 class="text-center mb-4">Login</h1>
    <form action="landing.html" method="GET">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn w-100" style="background-color: #3e495e; color: white;">Masuk</button>
    </form>
    <p class="text-center mt-3 small">Belum punya akun? <a href="#" style="color: #3e495e;">Daftar di sini</a></p>
  </main>

</body>
</html>
